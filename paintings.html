	  <!-- The Modal -->
	  <div id="myModal" class="modal">
		  <span class="close">&times;</span>
		  <span class="prev"><</span>
		  <span class="next">></span>
		  <!--<a class="prev" onclick="nextModal(-1)">&#10094;</a>-->
		  <!--<a class="next" onclick="nextModal(1)">&#10095;</a>-->
		  <img class="modal-content" id="img01">
		<div id="caption"></div>
	  </div>
	  <script>
      function dropdownFunction(){
        document.getElementById("myDropdown").classList.toggle("show");
      }
		  //initialize variables to get modal information
		  var photoPosition;
		  var modal = document.getElementById("myModal");
		  var modalImg = document.getElementById("img01");
		  var captionText = document.getElementById("caption");
		  //function to show and send img information to modal

		  function sendImg(src,alt,position){
		      modal.style.display = "block";
		      modalImg.src = src;
		      captionText.innerHTML = alt;
		      photoPosition = position;
		  }
		  //get the <span> element that closes the modal
		  var span = document.getElementsByClassName("close")[0];
		  //when the user clicks <span> (x), the modal closes
          span.onclick = function(){
              modal.style.display = "none";
		  }
		  var prev = document.getElementsByClassName("prev")[0];
          prev.onclick = function(){
              var i = parseInt(photoPosition)-1;
              var id = i.toString();
              var prevPhoto = document.getElementById(id);
              sendImg(prevPhoto.src,prevPhoto.alt,prevPhoto.id)

		  }
		  var next = document.getElementsByClassName("next")[0];
          next.onclick = function(){
              var i = parseInt(photoPosition)+1;
              var id = i.toString();
              var nextPhoto = document.getElementById(id);
              sendImg(nextPhoto.src,nextPhoto.alt,nextPhoto.id)
		  }





		  // Get the elements with class="column"
		  var elements = document.getElementsByClassName("column");
		  // Declare a loop variable
		  var i;
		  // Full-width images
		  function one() {
			  for (i = 0; i < elements.length; i++) {
				  elements[i].style.msFlex = "100%";  // IE10
				  elements[i].style.flex = "100%";
			  }
		  }


		  // Two images side by side
		  function two() {
			  for (i = 0; i < elements.length; i++) {
				  elements[i].style.msFlex = "50%";  // IE10
				  elements[i].style.flex = "50%";
			  }
		  }

		  function three(){
		      for (i=0; i<elements.length; i++){
		          elements[i].style.msFlex = "33.33%";
		          elements[i].style.flex = "33.33%";
			  }
		  }
		  // Four images side by side
		  function four() {
			  for (i = 0; i < elements.length; i++) {
				  elements[i].style.msFlex = "25%";  // IE10
				  elements[i].style.flex = "25%";
			  }
		  }

		  // Add active class to the current button (highlight it)
		  var header = document.getElementById("pictureGrid");
		  var btns = header.getElementsByClassName("gridBtn");
		  for (var i = 0; i < btns.length; i++) {
              btns[i].addEventListener("click", function () {
                  var current = document.getElementsByClassName("active");
                  current[0].className = current[0].className.replace(" active", "");
                  this.className += " active";
              });
          }

          //Get the button
          var myButton = document.getElementById("topBtn");
          // When the user scrolls down 20px from the top of the document, show the button
          window.onscroll = function() {scrollFunction()};

          function scrollFunction() {
              if (document.body.scrollTop > 20 || document.documentElement.scrollTop > 20) {
                  myButton.style.display = "block";
              } else {
                  myButton.style.display = "none";
              }
          }

          // When the user clicks on the button, scroll to the top of the document
          function topFunction() {
              document.body.scrollTop = 0;
              document.documentElement.scrollTop = 0;
          }
	  </script>
