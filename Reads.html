<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reads</title>
    <link href="style.css" rel="stylesheet" type="text/css">
    <meta name="viewport" content="width=device-width,initial-scale=1">

</head>
<body>
<header>
    <div class="top-bar">
        <div class="logo"><a href="index.html"><img src=images/logo.PNG></a></div>
        <ul class="menu">
            <li><a href="Reads.html">Materials</a></li>
            <li><a href="myWritings.html">Writings</a></li>
            <li><a href="Gallery.html">Paintings</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
        <button class="icon" onclick="dropdownFunction()">&#9776;</button>
        <div class="dropdown-content" id="myDropdown">
            <a href="index.html">Home</a>
            <a href="Reads.html">Materials</a>
            <a href="myWritings.html">Writings</a>
            <a href="Gallery.html">Paintings</a>
            <a href="about.html">About</a>
        </div>
    </div>
</header>
<section class="choicePanel">
    <div class="workSelection">
        <h1>Inspiring Works</h1>
        <select id="mySelect"; onchange=selectWork(value);>
            <option value="" disabled selected>Select: </option>
            <option value="Readings/1st.txt">1st Chorus</option>
            <option value="Readings/2nd.txt">2nd Chorus</option>
            <option value="Readings/3rd.txt">3rd Chorus</option>
        </select>
    </div>
    <div class="iFrameSelection">
        <iframe id="myFrame"></iframe>
    </div>

    <button onclick="draw()">click me</button>
    <p id="demo"></p>
</section>
<script>
    function dropdownFunction(){
        document.getElementById("myDropdown").classList.toggle("show");
    }    
    function selectWork(value){
        document.getElementById("myFrame").src = value;
    }



    function draw(){
        var i=59;
        var speed = 50;
        document.getElementById("demo").innerHTML = "";
        var myIFrame = document.getElementById('myFrame');
        var text = myIFrame.contentWindow.document.body.innerHTML;
        typeWriter();
        function typeWriter(){
            if(i<text.length-6){
                document.getElementById("demo").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, speed)
                }
            }
    }

</script>
</body>
</html>
